export default "<h4 class=\"display-4\">Research Projects</h4>\n<div class=\"container\">\n    <div *ngFor='let proj of projects'>\n        <div class=\"row\">\n            <div class=\"col-sm-4 col-xs-6\" align=\"left\" style=\"float:left\">\n\n                <img src={{proj.icon}} alt=\"VersaGNN\" class=\"img-thumbnail\">\n            </div>\n\n            <div class=\"col-sm-6 col-xs-6\">\n                <h4>{{proj.projName}}</h4>\n                <!-- <a href=\"{exp.companyLink}\">\n                <h4 style=\"color:black\">{{exp.jobTitle}}</h4>\n            </a> -->\n                <p class=\"text-muted\">\n                    {{proj.conference}} | {{proj.status}} <br>\n                    {{proj.intro}} <br> <br>\n                </p>\n                <div innerHTML=\"{{proj.authors}}\"></div>\n            </div>\n        </div>\n        <br><br>\n    </div>"
