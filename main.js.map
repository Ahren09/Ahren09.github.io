export default "<h4 class=\"display-4\">Experiences</h4>\n\n<div class=\"container\">\n\n    <div *ngFor='let exp of experiences'>\n        <div class=\"row\">\n            <div class=\"col-sm-2 col-xs-4\" align=\"left\" style=\"float:left\">\n                <a href={{exp.companyLink}}>\n                    <img src={{exp.icon}} alt=\"Circle Image\" class=\"rounded-circle img-raised\">\n                </a>\n            </div>\n    \n            <div class=\"col-sm-8 col-xs-8\">\n                <a href={{exp.companyLink}}>\n                    <h4 style=\"color:black\">{{exp.jobTitle}}</h4>\n                </a>\n                <p class=\"text-muted\">\n                    {{exp.jobTitleCN}}<br>\n                    {{exp.location}} | {{exp.team}} <br>\n                    {{exp.time}} <br>\n                </p>\n            </div>\n        </div>\n        <br><br>\n    </div>\n\n    \n\n    <!-- <div class=\"row\">\n        <div class=\"col-sm-2 col-xs-4\" align=\"left\" style=\"float:left\">\n            <a href=\"https://vcla.stat.ucla.edu/\">\n                <img src=\"assets/img/icons/VCLA.png\" alt=\"Circle Image\" class=\"rounded-circle img-raised\">\n            </a>\n        </div>\n\n        <div class=\"col-sm-8 col-xs-8\">\n            <a href=\"https://vcla.stat.ucla.edu/\">\n                <h4 style=\"color:black\">Undergraduate Research Assistant</h4>\n            </a>\n            <p class=\"text-muted\">\n                研究助理<br>\n                Los Angeles, United States | Center for Vision, Cognition, Learning, and Autonomy (VCLA) <br>\n                2019.9 - Present <br>\n            </p>\n        </div>\n    </div>\n\n    <br><br><br>\n\n    <div class=\"row\">\n        <div class=\"col-sm-2 col-xs-4\" align=\"left\" style=\"float:left\">\n            <a href=\"https://aws.amazon.com/\">\n                <img src=\"assets/img/icons/Amazon.png\" alt=\"Circle Image\" class=\"rounded-circle img-raised\">\n            </a>\n        </div>\n\n        <div class=\"col-sm-8 col-xs-8\">\n            <a href=\"https://aws.amazon.com/\">\n                <h4 style=\"color:black\">Software Development Engineer Intern</h4>\n            </a>\n            <p class=\"text-muted\">\n                软件开发实习生<br>\n                Seattle, United States | Amazon Web Service (AWS) <br>\n                2020.6 - 2020.9 <br>\n            </p>\n        </div>\n    </div>\n\n    <br><br><br>\n\n    <div class=\"row\">\n        <div class=\"col-sm-2 col-xs-4\" align=\"left\" style=\"float:left\">\n            <a href=\"https://www.research.ibm.com/labs/china/\">\n                <img src=\"assets/img/icons/IBM.png\" alt=\"Circle Image\" class=\"rounded-circle img-raised\">\n            </a>\n        </div>\n\n        <div class=\"col-sm-8 col-xs-8\">\n            <a href=\"https://www.research.ibm.com/labs/china/\">\n                <h4 style=\"color:black\">Software Development Engineer Intern</h4>\n            </a>\n            <p class=\"text-muted\">\n                软件开发实习生<br>\n                Beijing, China | IBM China System Center <br>\n                2019.6 - 2019.9 <br>\n            </p>\n        </div>\n    </div> -->\n\n</div>"
